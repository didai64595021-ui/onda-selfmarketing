<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>대시보드 - ONDA</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">ONDA</a>
    <nav class="nav">
      <a href="pricing.html">가격표</a>
      <a href="trial.html" class="nav-cta">무료체험</a>
    </nav>
    <button class="hamburger" aria-label="메뉴"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu">
    <a href="index.html">홈</a><a href="pricing.html">가격표</a><a href="trial.html">무료체험</a>
    <a href="messages.html">메시지 템플릿</a><a href="dashboard.html">대시보드</a>
  </div>
</header>

<section class="section" style="padding-top:100px">
  <div class="container">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:32px;flex-wrap:wrap;gap:12px">
      <h2 style="font-size:28px;font-weight:800">신청 현황</h2>
      <div style="display:flex;gap:8px">
        <button class="btn btn-outline" style="padding:8px 16px;font-size:14px" onclick="exportCSV()">📥 CSV 내보내기</button>
        <button class="btn btn-outline" style="padding:8px 16px;font-size:14px" onclick="addTestData()">+ 테스트 데이터</button>
      </div>
    </div>

    <div class="dash-stats" id="stats"></div>

    <div class="filter-tabs" id="filters">
      <button class="filter-tab active" data-filter="all">전체</button>
      <button class="filter-tab" data-filter="pending">대기</button>
      <button class="filter-tab" data-filter="contacted">연락완료</button>
      <button class="filter-tab" data-filter="active">진행중</button>
      <button class="filter-tab" data-filter="converted">전환</button>
    </div>

    <div style="overflow-x:auto">
      <table class="dash-table" id="table">
        <thead>
          <tr><th>#</th><th>매장명</th><th>키워드</th><th>연락처</th><th>업종</th><th>상태</th><th>신청일</th><th>액션</th></tr>
        </thead>
        <tbody id="tbody"></tbody>
      </table>
    </div>
    <p id="emptyMsg" style="text-align:center;padding:40px;color:var(--gray-500);display:none">신청 내역이 없습니다. <a href="trial.html" style="color:var(--primary)">무료체험 신청</a>에서 테스트해보세요.</p>
  </div>
</section>

<!-- 메모 모달 -->
<div id="memoModal" style="display:none;position:fixed;inset:0;z-index:2000;background:rgba(0,0,0,0.5);align-items:center;justify-content:center">
  <div style="background:#fff;border-radius:16px;padding:32px;max-width:480px;width:90%;margin:auto;position:relative;top:50%;transform:translateY(-50%)">
    <h3 style="margin-bottom:16px">메모 추가</h3>
    <textarea id="memoText" style="width:100%;min-height:100px;padding:12px;border:1px solid var(--gray-200);border-radius:8px;font-family:inherit;font-size:15px" placeholder="메모를 입력하세요..."></textarea>
    <div style="display:flex;gap:8px;margin-top:16px;justify-content:flex-end">
      <button class="btn btn-outline" style="padding:8px 20px" onclick="closeMemo()">취소</button>
      <button class="btn btn-primary" style="padding:8px 20px" onclick="saveMemo()">저장</button>
    </div>
  </div>
</div>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-top">
      <div class="footer-brand"><div class="logo">ONDA</div><p>AI 기반 네이버 플레이스 순위 관리 서비스</p></div>
    </div>
    <div class="footer-bottom">© 2026 ONDA Marketing. All rights reserved.</div>
  </div>
</footer>

<script src="app.js"></script>
<script>
let currentFilter = 'all';
let memoTargetId = null;

function getTrials() { return JSON.parse(localStorage.getItem('onda_trials') || '[]'); }
function saveTrials(t) { localStorage.setItem('onda_trials', JSON.stringify(t)); }

function render() {
  const trials = getTrials();
  const filtered = currentFilter === 'all' ? trials : trials.filter(t => t.status === currentFilter);
  
  // Stats
  const stats = { total: trials.length, pending: 0, contacted: 0, active: 0, converted: 0 };
  trials.forEach(t => { if (stats[t.status] !== undefined) stats[t.status]++; });
  document.getElementById('stats').innerHTML = `
    <div class="dash-stat"><div class="number">${stats.total}</div><div class="label">총 신청</div></div>
    <div class="dash-stat"><div class="number">${stats.pending}</div><div class="label">대기</div></div>
    <div class="dash-stat"><div class="number">${stats.active + stats.contacted}</div><div class="label">진행중</div></div>
    <div class="dash-stat"><div class="number">${stats.converted}</div><div class="label">전환</div></div>`;

  // Table
  const tbody = document.getElementById('tbody');
  const empty = document.getElementById('emptyMsg');
  if (filtered.length === 0) { tbody.innerHTML = ''; empty.style.display = 'block'; return; }
  empty.style.display = 'none';
  
  tbody.innerHTML = filtered.map((t, i) => `
    <tr>
      <td>${i + 1}</td>
      <td><strong>${t.storeName}</strong>${t.notes ? '<br><small style="color:var(--gray-500)">📝 ' + t.notes + '</small>' : ''}</td>
      <td>${t.keyword}</td>
      <td>${t.contact}</td>
      <td>${t.industry || '-'}</td>
      <td><span class="status-badge status-${t.status}">${statusLabel(t.status)}</span></td>
      <td>${new Date(t.createdAt).toLocaleDateString('ko')}</td>
      <td>
        <select onchange="changeStatus(${t.id}, this.value)" style="padding:4px 8px;border-radius:6px;border:1px solid var(--gray-200);font-size:13px">
          <option value="pending" ${t.status==='pending'?'selected':''}>대기</option>
          <option value="contacted" ${t.status==='contacted'?'selected':''}>연락완료</option>
          <option value="active" ${t.status==='active'?'selected':''}>진행중</option>
          <option value="converted" ${t.status==='converted'?'selected':''}>전환</option>
        </select>
        <button onclick="openMemo(${t.id})" style="margin-left:4px;padding:4px 8px;border-radius:6px;border:1px solid var(--gray-200);background:#fff;cursor:pointer;font-size:13px">📝</button>
      </td>
    </tr>`).join('');
}

function statusLabel(s) { return { pending:'대기', contacted:'연락완료', active:'진행중', converted:'전환' }[s] || s; }

function changeStatus(id, status) {
  const trials = getTrials();
  const t = trials.find(x => x.id === id);
  if (t) { t.status = status; saveTrials(trials); render(); }
}

function openMemo(id) {
  memoTargetId = id;
  const trials = getTrials();
  const t = trials.find(x => x.id === id);
  document.getElementById('memoText').value = t?.notes || '';
  document.getElementById('memoModal').style.display = 'block';
}

function closeMemo() { document.getElementById('memoModal').style.display = 'none'; memoTargetId = null; }

function saveMemo() {
  const trials = getTrials();
  const t = trials.find(x => x.id === memoTargetId);
  if (t) { t.notes = document.getElementById('memoText').value; saveTrials(trials); render(); }
  closeMemo();
}

function exportCSV() {
  const trials = getTrials();
  if (!trials.length) return alert('데이터가 없습니다');
  const header = '매장명,키워드,연락처,업종,상태,고민,메모,신청일\n';
  const rows = trials.map(t => `"${t.storeName}","${t.keyword}","${t.contact}","${t.industry}","${statusLabel(t.status)}","${t.concern||''}","${t.notes||''}","${t.createdAt}"`).join('\n');
  const blob = new Blob(['\uFEFF' + header + rows], { type: 'text/csv;charset=utf-8' });
  const a = document.createElement('a'); a.href = URL.createObjectURL(blob); a.download = `onda_trials_${new Date().toISOString().slice(0,10)}.csv`; a.click();
}

function addTestData() {
  const names = ['맛있는 떡볶이','강남 삼겹살','홍대 카페라떼','역삼 네일샵','판교 치킨'];
  const kws = ['강남역 떡볶이','강남 삼겹살 맛집','홍대 카페','역삼 네일','판교 치킨 맛집'];
  const inds = ['음식점','음식점','카페','미용실','음식점'];
  const trials = getTrials();
  const i = trials.length % 5;
  trials.push({ id: Date.now(), storeName: names[i], placeUrl: 'https://map.naver.com/test', keyword: kws[i], contact: '010-1234-' + (5678 + i), industry: inds[i], concern: '순위가 떨어졌어요', status: 'pending', notes: '', createdAt: new Date().toISOString() });
  saveTrials(trials); render();
}

// Filter tabs
document.getElementById('filters').addEventListener('click', (e) => {
  if (e.target.classList.contains('filter-tab')) {
    document.querySelectorAll('.filter-tab').forEach(t => t.classList.remove('active'));
    e.target.classList.add('active');
    currentFilter = e.target.dataset.filter;
    render();
  }
});

render();
</script>
</body>
</html>
