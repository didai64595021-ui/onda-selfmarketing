<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>무료체험 신청 - ONDA</title>
<link rel="stylesheet" href="styles.css">
</head>
<body>

<header class="header">
  <div class="header-inner">
    <a href="index.html" class="logo">ONDA</a>
    <nav class="nav">
      <a href="pricing.html">가격표</a>
      <a href="trial.html" class="nav-cta active">무료체험</a>
    </nav>
    <button class="hamburger" aria-label="메뉴"><span></span><span></span><span></span></button>
  </div>
  <div class="mobile-menu">
    <a href="index.html">홈</a><a href="pricing.html">가격표</a><a href="trial.html">무료체험</a>
    <a href="messages.html">메시지 템플릿</a><a href="dashboard.html">대시보드</a>
  </div>
</header>

<section class="section" style="padding-top:120px">
  <div class="container" style="max-width:600px">
    <div id="trialForm">
      <h2 class="section-title">리뷰 3건 무료 체험</h2>
      <p class="section-sub">사진 포함 고품질 리뷰 • 24시간 내 연락</p>
      
      <form id="form" onsubmit="return submitTrial(event)">
        <div class="form-group">
          <label>매장명 *</label>
          <input type="text" name="storeName" required placeholder="예: 맛있는 떡볶이">
        </div>
        <div class="form-group">
          <label>네이버 플레이스 URL *</label>
          <input type="url" name="placeUrl" required placeholder="https://map.naver.com/...">
        </div>
        <div class="form-group">
          <label>검색 키워드 *</label>
          <input type="text" name="keyword" required placeholder="예: 강남역 떡볶이">
        </div>
        <div class="form-group">
          <label>연락처 *</label>
          <input type="text" name="contact" required placeholder="010-0000-0000 또는 카카오톡 ID">
        </div>
        <div class="form-group">
          <label>업종</label>
          <select name="industry">
            <option value="">선택하세요</option>
            <option value="음식점">음식점</option>
            <option value="카페">카페</option>
            <option value="미용실">미용실</option>
            <option value="병원">병원</option>
            <option value="헬스장">헬스장</option>
            <option value="기타">기타</option>
          </select>
        </div>
        <div class="form-group">
          <label>현재 고민 (선택)</label>
          <textarea name="concern" placeholder="순위가 떨어졌어요, 경쟁이 심해졌어요..."></textarea>
        </div>
        <button type="submit" class="btn btn-primary btn-lg" style="width:100%">무료 체험 시작하기 →</button>
        <p style="text-align:center;font-size:13px;color:var(--gray-500);margin-top:12px">91,000개 매장 데이터 분석 중 • 개인정보 안전하게 보호</p>
      </form>
    </div>

    <div id="successScreen" class="success-screen" style="display:none">
      <div class="success-icon">✅</div>
      <h2 style="font-size:28px;font-weight:800;margin-bottom:12px">신청 완료!</h2>
      <p style="color:var(--gray-500);margin-bottom:32px">24시간 내 연락드리겠습니다.<br>카카오 채널 추가하시면 더 빠른 상담 가능해요!</p>
      <a href="#KAKAO_URL" class="btn btn-primary" style="margin-bottom:16px">카카오채널 추가하기</a>
      <br>
      <a href="dashboard.html" style="color:var(--primary);font-weight:600;font-size:14px">신청 현황 확인 →</a>
    </div>
  </div>
</section>

<footer class="footer">
  <div class="footer-inner">
    <div class="footer-top">
      <div class="footer-brand"><div class="logo">ONDA</div><p>AI 기반 네이버 플레이스 순위 관리 서비스</p></div>
      <div class="footer-links">
        <div><a href="index.html">홈</a><a href="pricing.html">가격표</a><a href="trial.html">무료체험</a></div>
        <div><a href="mailto:contact@onda.kr">contact@onda.kr</a></div>
      </div>
    </div>
    <div class="footer-bottom">© 2026 ONDA Marketing. All rights reserved.</div>
  </div>
</footer>

<script src="config.js"></script>
<script src="app.js"></script>
<script>
async function submitTrial(e) {
  e.preventDefault();
  const form = e.target;
  const btn = form.querySelector('button[type=submit]');
  btn.disabled = true; btn.textContent = '신청 중...';
  
  const data = {
    store_name: form.storeName.value,
    place_url: form.placeUrl.value,
    keyword: form.keyword.value,
    contact: form.contact.value,
    industry: form.industry.value || null,
    concern: form.concern.value || null,
    status: 'lead',
    source_channel: 'website'
  };
  
  try {
    // Supabase에 저장
    await sbInsert('sm_customers', data);
    // localStorage 백업도 유지
    const trials = JSON.parse(localStorage.getItem('onda_trials') || '[]');
    trials.push({ ...data, id: Date.now(), createdAt: new Date().toISOString() });
    localStorage.setItem('onda_trials', JSON.stringify(trials));
  } catch(err) {
    // Supabase 실패 시 localStorage만
    const trials = JSON.parse(localStorage.getItem('onda_trials') || '[]');
    trials.push({ ...data, id: Date.now(), createdAt: new Date().toISOString() });
    localStorage.setItem('onda_trials', JSON.stringify(trials));
  }
  
  document.getElementById('trialForm').style.display = 'none';
  document.getElementById('successScreen').style.display = 'block';
  return false;
}
</script>
</body>
</html>
