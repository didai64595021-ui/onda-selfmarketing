<!DOCTYPE html>
<html lang="ko">
<head><meta charset="UTF-8"><meta name="viewport" content="width=device-width,initial-scale=1.0"><title>타겟 DB - ONDA</title><link rel="stylesheet" href="styles.css"></head>
<body>
<header class="header"><div class="header-inner"><a href="admin.html" class="logo">ONDA</a><nav class="nav"><a href="admin.html">어드민</a></nav><button class="hamburger" aria-label="메뉴"><span></span><span></span><span></span></button></div></header>
<section class="section" style="padding-top:100px">
  <div class="container">
    <h2 style="font-size:28px;font-weight:800;margin-bottom:8px">🎯 타겟 DB & 발송 스케줄</h2>
    <p style="color:var(--gray-500);margin-bottom:24px">타겟 고갈 모니터링 + 월별 발송 볼륨 관리</p>

    <div class="auto-card" style="margin-bottom:24px">
      <h3 style="margin-bottom:16px">타겟 풀 잔여량</h3>
      <div id="poolList"></div>
    </div>

    <div class="auto-card" style="margin-bottom:24px">
      <h3 style="margin-bottom:16px">📊 발송 볼륨 스케줄 (M1→M8)</h3>
      <div style="overflow-x:auto">
        <table class="dash-table">
          <thead><tr><th>월</th><th>일 발송량</th><th>계정/일</th><th>월 발송량</th><th>실제 일평균</th><th>실제 월합계</th><th>달성률</th></tr></thead>
          <tbody id="schedBody"></tbody>
        </table>
      </div>
    </div>

    <div class="auto-card">
      <h3 style="margin-bottom:16px">⚠️ 고갈 예측</h3>
      <div id="depletionForecast"></div>
    </div>
  </div>
</section>
<footer class="footer"><div class="footer-inner"><div class="footer-bottom">© 2026 ONDA Marketing</div></div></footer>
<script src="config.js"></script><script src="app.js"></script>
<script src="event-hub.js"></script>
<script>
async function load() {
  const pools = await sbQuery('sm_target_pool?order=priority.asc');
  const totalRemaining = pools.reduce((s,p)=>s+(p.remaining_count||0),0);
  const totalSent = pools.reduce((s,p)=>s+(p.sent_count||0),0);
  
  document.getElementById('poolList').innerHTML = pools.map(p => {
    const pct = p.total_count ? (p.remaining_count/p.total_count*100) : 0;
    const color = pct > 60 ? 'var(--accent)' : pct > 30 ? '#fd7e14' : '#dc3545';
    return `<div style="margin-bottom:16px">
      <div style="display:flex;justify-content:space-between;margin-bottom:4px">
        <span><strong>${p.priority}순위</strong> ${p.description}</span>
        <span style="font-weight:700;color:${color}">${p.remaining_count?.toLocaleString()} / ${p.total_count?.toLocaleString()}</span>
      </div>
      <div style="background:var(--gray-100);border-radius:4px;height:10px;overflow:hidden">
        <div style="background:${color};height:100%;width:${pct}%;border-radius:4px;transition:width 0.5s"></div>
      </div>
    </div>`;
  }).join('');

  const schedules = await sbQuery('sm_send_schedule?order=month.asc');
  document.getElementById('schedBody').innerHTML = schedules.map(s => {
    const pct = s.monthly_target ? (s.actual_monthly_total/s.monthly_target*100).toFixed(0) : 0;
    return `<tr>
      <td><strong>M${s.month}</strong></td>
      <td>${s.daily_target}건</td>
      <td>${s.accounts_per_day}개</td>
      <td>${s.monthly_target?.toLocaleString()}건</td>
      <td>${s.actual_daily_avg}건</td>
      <td>${s.actual_monthly_total?.toLocaleString()}건</td>
      <td><span style="color:${pct>=80?'var(--accent)':pct>=50?'#fd7e14':'#dc3545'};font-weight:700">${pct}%</span></td>
    </tr>`;
  }).join('');

  // Depletion forecast
  const avgDaily = totalSent > 0 ? Math.round(totalSent / 30) : 200;
  const daysLeft = avgDaily > 0 ? Math.round(totalRemaining / avgDaily) : 999;
  const depletionDate = new Date(Date.now() + daysLeft * 86400000).toLocaleDateString('ko');
  document.getElementById('depletionForecast').innerHTML = `
    <div style="display:grid;grid-template-columns:repeat(3,1fr);gap:16px;text-align:center">
      <div style="padding:16px;background:var(--gray-50);border-radius:8px">
        <div style="font-size:28px;font-weight:800;color:var(--primary)">${totalRemaining.toLocaleString()}</div>
        <div style="font-size:13px;color:var(--gray-500)">잔여 타겟</div>
      </div>
      <div style="padding:16px;background:var(--gray-50);border-radius:8px">
        <div style="font-size:28px;font-weight:800;color:${daysLeft<90?'#dc3545':'var(--accent)'}">${daysLeft}일</div>
        <div style="font-size:13px;color:var(--gray-500)">예상 소진일</div>
      </div>
      <div style="padding:16px;background:var(--gray-50);border-radius:8px">
        <div style="font-size:28px;font-weight:800">${depletionDate}</div>
        <div style="font-size:13px;color:var(--gray-500)">고갈 예상일</div>
      </div>
    </div>`;
}
load();
</script>
</body>
</html>
